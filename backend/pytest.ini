[pytest]
testpaths = tests
addopts = -v --tb=short --no-header

markers =
    slow: tests de performance (génération massive, smoke perf)
    integration: tests d'intégration API (nécessitent FastAPI + httpx)
    unit: tests unitaires (logique pure, pas d'API)

# Grouper les sorties par fichier
console_output_style = progress
